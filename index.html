<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#507DE5" />
<title>Power Analytix — Timesheet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Albert+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3/lib/msal-browser.min.js"></script>
<style>
  :root{
    --ink:#10183a;
    --bg:#eef2fb;
    --card:#ffffff;
    --brand:#507DE5;
    --brand-dk:#2f55b8;
    --brand-deep:#1b3a8c;
    --line:#dde4f3;
    --muted:#69718c;
    --err:#b3261e;
    --warn:#8a6d1f;
    --ok:#1f7a4d;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;min-height:100vh;
    font-family:'Albert Sans',system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(130% 90% at 0% 0%, #dce7fb 0%, transparent 55%),
      radial-gradient(130% 90% at 100% 100%, #e3e9fa 0%, transparent 55%),
      var(--bg);
    display:flex;justify-content:center;align-items:flex-start;
    padding:28px 18px 60px;
  }
  .wrap{width:100%;max-width:460px;animation:rise .5s cubic-bezier(.2,.7,.3,1) both;}
  @keyframes rise{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
  header{display:flex;align-items:center;gap:13px;margin-bottom:20px;}
  .logo{
    width:54px;height:54px;border-radius:13px;flex:0 0 auto;
    background:#fff;border:1px solid var(--line);
    box-shadow:0 6px 16px -10px rgba(27,58,140,.5);
    object-fit:contain;padding:5px;
  }
  .brand-text .kicker{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--brand);font-weight:600;}
  h1{font-family:'Sora',sans-serif;font-weight:700;font-size:25px;line-height:1.05;margin:3px 0 0;letter-spacing:-.01em;}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:22px;box-shadow:0 1px 0 rgba(0,0,0,.02),0 20px 44px -30px rgba(16,24,58,.4);
  }
  label{display:block;font-size:13px;font-weight:600;margin:0 0 6px;}
  .field{margin-bottom:16px;}
  input,select,textarea{
    width:100%;font-family:inherit;font-size:16px;color:var(--ink);
    background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 12px;
    transition:border-color .15s,box-shadow .15s;
  }
  input:focus,select:focus,textarea:focus{
    outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(80,125,229,.18);
  }
  textarea{min-height:96px;resize:vertical;}
  .hint{font-size:12px;color:var(--muted);margin-top:5px;}
  button{
    font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;
    border:none;border-radius:10px;padding:13px;transition:filter .15s,transform .05s;
  }
  .btn-primary{width:100%;background:linear-gradient(135deg,var(--brand) 0%,var(--brand-deep) 100%);color:#fff;}
  .btn-primary:hover{filter:brightness(1.06);}
  .btn-primary:active{transform:translateY(1px);}
  .btn-primary:disabled{opacity:.55;cursor:default;}
  .btn-ghost{width:100%;background:transparent;color:var(--muted);font-weight:500;font-size:13px;padding:8px;margin-top:10px;}
  .greeting{font-size:14px;color:var(--muted);margin-bottom:16px;}
  .greeting b{color:var(--ink);}

  /* tabs */
  .tabs{display:flex;gap:6px;background:#eef2fb;border:1px solid var(--line);border-radius:11px;padding:4px;margin-bottom:18px;}
  .tab{flex:1;background:transparent;color:var(--muted);font-size:14px;font-weight:600;padding:9px;border-radius:8px;}
  .tab.active{background:#fff;color:var(--brand-dk);box-shadow:0 1px 4px -1px rgba(16,24,58,.2);}

  /* messages */
  .msg{border-radius:10px;padding:11px 12px;font-size:14px;margin-bottom:16px;display:none;}
  .msg.show{display:block;}
  .msg.error{background:#fbeae9;color:var(--err);border:1px solid #f3c9c6;}
  .msg.warn{background:#fbf3dc;color:var(--warn);border:1px solid #f0e0b0;}
  .msg.ok{background:#e6f4ec;color:var(--ok);border:1px solid #c2e2cf;}
  .edit-banner{background:#eaf0fc;color:var(--brand-dk);border:1px solid #cfddf7;border-radius:10px;padding:9px 12px;font-size:13px;margin-bottom:14px;display:none;}
  .edit-banner.show{display:block;}

  /* entries */
  .total{font-size:13px;color:var(--muted);margin-bottom:14px;}
  .total b{color:var(--ink);font-size:15px;}
  .entry{border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:10px;}
  .entry-top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px;}
  .entry-date{font-weight:600;font-size:15px;}
  .entry-hours{font-weight:600;color:var(--brand-dk);font-size:14px;white-space:nowrap;}
  .pill{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;background:#eef2fb;color:var(--brand-dk);}
  .entry-desc{font-size:13px;color:#3a4360;margin:6px 0 10px;line-height:1.45;white-space:pre-wrap;}
  .entry-actions{display:flex;gap:8px;}
  .entry-actions button{flex:1;font-size:13px;font-weight:600;padding:8px;border-radius:8px;border:1px solid var(--line);background:#fff;}
  .btn-edit{color:var(--brand-dk);}
  .btn-edit:hover{background:#f3f7ff;}
  .btn-del{color:var(--err);}
  .btn-del:hover{background:#fdf2f1;}
  .empty{text-align:center;color:var(--muted);font-size:14px;padding:24px 0;}
  .loading{text-align:center;color:var(--muted);font-size:14px;padding:20px 0;}

  #loginView{text-align:center;padding:8px 0 4px;}
  #loginView p{color:var(--muted);font-size:14px;margin:0 0 18px;}
  .hidden{display:none !important;}
  footer{text-align:center;font-size:11px;color:var(--muted);margin-top:18px;letter-spacing:.04em;}
</style>
</head>

    <div class="brand-text">
      <div class="kicker">Daily Timesheet</div>
      <h1>Power Analytix</h1>
    </div>
  </header>

  <div class="card">
    <!-- Sign-in view -->
    <div id="loginView">
      <p>Sign in with your account to log your hours.</p>
      <button class="btn-primary" id="loginBtn">Sign in</button>
    </div>

    <!-- App (after sign-in) -->
    <div id="appView" class="hidden">
      <div class="greeting">Signed in as <b id="userName">…</b></div>

      <div class="tabs">
        <button class="tab active" id="tabLog">Log entry</button>
        <button class="tab" id="tabEntries">My entries</button>
      </div>

      <div class="msg" id="message"></div>

      <!-- LOG / EDIT FORM -->
      <div id="logView">
        <div class="edit-banner" id="editBanner">Editing an existing entry. Change the fields and press Update.</div>

        <div class="field">
          <label for="entryDate">Date</label>
          <input type="date" id="entryDate" />
        </div>

        <div class="field">
          <label for="status">Status</label>
          <select id="status">
            <option value="Working">Working</option>
            <option value="Annual Leave">Annual Leave</option>
            <option value="Bank Holiday">Bank Holiday</option>
            <option value="Sick">Sick</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="field">
          <label for="hours">Hours worked</label>
          <input type="number" id="hours" min="0" max="24" step="0.25" placeholder="e.g. 7.5" />
        </div>

        <div class="field">
          <label for="description">What did you do today?</label>
          <textarea id="description" placeholder="Brief description of the work…"></textarea>
          <div class="hint">Required when status is “Working”.</div>
        </div>

        <button class="btn-primary" id="submitBtn">Submit entry</button>
        <button class="btn-ghost hidden" id="cancelEditBtn">Cancel edit</button>
      </div>

      <!-- MY ENTRIES -->
      <div id="entriesView" class="hidden">
        <div class="total" id="totalLine"></div>
        <div id="entriesList"><div class="loading">Loading your entries…</div></div>
      </div>

      <button class="btn-ghost" id="logoutBtn">Sign out</button>
    </div>
  </div>

  <footer>Power Analytix · you can only see and change your own entries.</footer>
</div>

<script>
/* ----------------------------------------------------------------------
   CONFIG
---------------------------------------------------------------------- */
const CONFIG = {
  clientId: "f76b090f-7d46-447b-8545-954d22814232",
  tenantId: "be344548-8db6-49d6-8155-1f85b6ae1dad",
  redirectUri: "https://timesheet.poweranalytix.co.uk/",
  siteId: "netorgft7286889.sharepoint.com,e8cbd86e-e98b-46c0-ab5e-ea2805525cd5,74b8ba2d-7746-467d-a85a-e6882f9a11bd",
  listId: "60e32298-a03a-4a7d-9418-2834b4e7aa49"
};
const GRAPH = "https://graph.microsoft.com/v1.0";
const SCOPES = ["User.Read", "Sites.ReadWrite.All"];

const msalConfig = {
  auth: {
    clientId: CONFIG.clientId,
    authority: "https://login.microsoftonline.com/" + CONFIG.tenantId,
    redirectUri: CONFIG.redirectUri
  },
  cache: { cacheLocation: "sessionStorage", storeAuthStateInCookie: false }
};

let msalInstance;
let account = null;
let editingId = null;   // null = creating; an item id = editing that item

const $ = id => document.getElementById(id);
const els = {
  loginView: $("loginView"), appView: $("appView"),
  loginBtn: $("loginBtn"), logoutBtn: $("logoutBtn"),
  tabLog: $("tabLog"), tabEntries: $("tabEntries"),
  logView: $("logView"), entriesView: $("entriesView"),
  submitBtn: $("submitBtn"), cancelEditBtn: $("cancelEditBtn"),
  editBanner: $("editBanner"),
  userName: $("userName"),
  entryDate: $("entryDate"), status: $("status"), hours: $("hours"), description: $("description"),
  message: $("message"),
  entriesList: $("entriesList"), totalLine: $("totalLine")
};

function showMsg(text, type){ els.message.textContent = text; els.message.className = "msg show " + type; }
function clearMsg(){ els.message.className = "msg"; }
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function todayISO(){
  const d = new Date(); const off = d.getTimezoneOffset();
  return new Date(d.getTime() - off*60000).toISOString().slice(0,10);
}
function fmtDate(iso){
  const d = new Date(iso); if (isNaN(d)) return iso;
  return d.toLocaleDateString("en-GB", { day:"numeric", month:"short", year:"numeric" });
}

/* ---------- view switching ---------- */
function showLogin(){ els.loginView.classList.remove("hidden"); els.appView.classList.add("hidden"); }
function showApp(){
  els.loginView.classList.add("hidden"); els.appView.classList.remove("hidden");
  els.userName.textContent = account.name || account.username;
  switchTab("log");
}
function switchTab(tab){
  clearMsg();
  const isLog = tab === "log";
  els.tabLog.classList.toggle("active", isLog);
  els.tabEntries.classList.toggle("active", !isLog);
  els.logView.classList.toggle("hidden", !isLog);
  els.entriesView.classList.toggle("hidden", isLog);
  if (isLog){ if (!editingId) resetForm(); }
  else { loadEntries(); }
}

/* ---------- form helpers ---------- */
function resetForm(){
  editingId = null;
  els.entryDate.value = todayISO();
  els.status.value = "Working";
  els.hours.value = "";
  els.description.value = "";
  els.submitBtn.textContent = "Submit entry";
  els.editBanner.classList.remove("show");
  els.cancelEditBtn.classList.add("hidden");
}
function beginEdit(item){
  editingId = item.id;
  const f = item.fields || {};
  els.entryDate.value = (f.EntryDate || "").slice(0,10) || todayISO();
  els.status.value = f.WorkStatus || "Working";
  els.hours.value = (f.HoursWorked ?? "");
  els.description.value = f.WorkDescription || "";
  els.submitBtn.textContent = "Update entry";
  els.editBanner.classList.add("show");
  els.cancelEditBtn.classList.remove("hidden");
  switchTab("log");
}
els.cancelEditBtn.onclick = () => { resetForm(); };

/* ---------- MSAL ---------- */
async function init(){
  msalInstance = new msal.PublicClientApplication(msalConfig);
  await msalInstance.initialize();
  try { const r = await msalInstance.handleRedirectPromise(); if (r && r.account) account = r.account; }
  catch(e){ console.error("Redirect handling error", e); }
  if (!account){ const a = msalInstance.getAllAccounts(); if (a.length) account = a[0]; }
  if (account) showApp(); else showLogin();
}
els.loginBtn.onclick = () => msalInstance.loginRedirect({ scopes: SCOPES });
els.logoutBtn.onclick = () => msalInstance.logoutRedirect({ account });

async function getToken(){
  try { const r = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account }); return r.accessToken; }
  catch(e){ await msalInstance.acquireTokenRedirect({ scopes: SCOPES }); throw e; }
}

/* ---------- data ---------- */
async function fetchMyItems(token){
  const url = GRAPH + "/sites/" + CONFIG.siteId + "/lists/" + CONFIG.listId +
    "/items?$expand=fields&$filter=fields/StaffEmail eq '" + account.username.replace(/'/g,"''") + "'&$top=200";
  const res = await fetch(url, {
    headers: { Authorization: "Bearer " + token, Prefer: "HonorNonIndexedQueriesWarningMayFailRandomly" }
  });
  if (!res.ok) throw new Error("list " + res.status);
  const data = await res.json();
  return (data.value || []).sort((a,b) => (b.fields?.EntryDate||"").localeCompare(a.fields?.EntryDate||""));
}

async function loadEntries(){
  els.entriesList.innerHTML = '<div class="loading">Loading your entries…</div>';
  els.totalLine.textContent = "";
  try {
    const token = await getToken();
    const items = await fetchMyItems(token);
    renderEntries(items);
  } catch(e){
    console.error(e);
    els.entriesList.innerHTML = '<div class="empty">Couldn\'t load your entries. Please try again.</div>';
  }
}

function renderEntries(items){
  if (!items.length){ els.entriesList.innerHTML = '<div class="empty">No entries yet. Log your first one in the “Log entry” tab.</div>'; els.totalLine.textContent=""; return; }

  // monthly total
  const now = new Date(); const ym = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
  let monthHours = 0;
  items.forEach(it => { if ((it.fields?.EntryDate||"").slice(0,7) === ym) monthHours += Number(it.fields?.HoursWorked||0); });
  els.totalLine.innerHTML = "This month: <b>" + monthHours + " h</b> across " + items.filter(it => (it.fields?.EntryDate||"").slice(0,7)===ym).length + " day(s).";

  els.entriesList.innerHTML = items.map(it => {
    const f = it.fields || {};
    return '<div class="entry">' +
      '<div class="entry-top"><span class="entry-date">' + fmtDate(f.EntryDate) + '</span>' +
      '<span class="entry-hours">' + Number(f.HoursWorked||0) + ' h</span></div>' +
      '<span class="pill">' + esc(f.WorkStatus||"") + '</span>' +
      (f.WorkDescription ? '<div class="entry-desc">' + esc(f.WorkDescription) + '</div>' : '<div class="entry-desc" style="color:#9aa3bd">No description.</div>') +
      '<div class="entry-actions">' +
        '<button class="btn-edit" data-edit="' + it.id + '">Edit</button>' +
        '<button class="btn-del" data-del="' + it.id + '" data-date="' + esc((f.EntryDate||"").slice(0,10)) + '">Delete</button>' +
      '</div></div>';
  }).join("");

  // wire buttons
  els.entriesList.querySelectorAll("[data-edit]").forEach(b => b.onclick = () => {
    const item = items.find(x => x.id === b.getAttribute("data-edit"));
    if (item) beginEdit(item);
  });
  els.entriesList.querySelectorAll("[data-del]").forEach(b => b.onclick = () => deleteEntry(b.getAttribute("data-del"), b.getAttribute("data-date")));
}

async function deleteEntry(id, dateStr){
  if (!confirm("Delete your entry for " + fmtDate(dateStr) + "? This can't be undone.")) return;
  try {
    const token = await getToken();
    const res = await fetch(GRAPH + "/sites/" + CONFIG.siteId + "/lists/" + CONFIG.listId + "/items/" + id, {
      method: "DELETE", headers: { Authorization: "Bearer " + token }
    });
    if (!res.ok && res.status !== 204){ console.error(await res.text()); showMsg("Couldn't delete (" + res.status + ").", "error"); switchTab("entries"); return; }
    showMsg("Entry deleted.", "ok");
    loadEntries();
  } catch(e){ console.error(e); showMsg("Something went wrong deleting that entry.", "error"); }
}

/* ---------- dedupe (skips the row being edited) ---------- */
async function alreadyLogged(token, email, dateStr){
  try {
    const items = await fetchMyItems(token);
    return items.some(it => (it.fields?.EntryDate||"").slice(0,10) === dateStr && it.id !== editingId);
  } catch(e){ console.warn("Dedupe skipped", e); return false; }
}

/* ---------- submit (create or update) ---------- */
async function submit(){
  clearMsg();
  const dateStr = els.entryDate.value;
  const status = els.status.value;
  const hoursRaw = els.hours.value.trim();
  const hours = parseFloat(hoursRaw);
  const desc = els.description.value.trim();

  if (!dateStr){ showMsg("Please choose a date.", "error"); return; }
  if (hoursRaw === "" || isNaN(hours) || hours < 0 || hours > 24){ showMsg("Hours must be a number between 0 and 24.", "error"); return; }
  if (status === "Working" && !desc){ showMsg("Please describe the work you did.", "error"); return; }

  els.submitBtn.disabled = true;
  const isEdit = !!editingId;
  els.submitBtn.textContent = isEdit ? "Updating…" : "Saving…";

  try {
    const token = await getToken();
    const email = account.username;

    if (await alreadyLogged(token, email, dateStr)){
      showMsg("You've already logged " + fmtDate(dateStr) + ". Edit that entry instead.", "warn");
      return;
    }

    const fields = {
      Title: email + " - " + dateStr,
      EntryDate: dateStr,
      StaffName: account.name || email,
      StaffEmail: email,
      HoursWorked: hours,
      WorkStatus: status,
      WorkDescription: desc,
      SubmittedOn: new Date().toISOString()
    };

    let res;
    if (isEdit){
      res = await fetch(GRAPH + "/sites/" + CONFIG.siteId + "/lists/" + CONFIG.listId + "/items/" + editingId + "/fields", {
        method: "PATCH",
        headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" },
        body: JSON.stringify(fields)
      });
    } else {
      res = await fetch(GRAPH + "/sites/" + CONFIG.siteId + "/lists/" + CONFIG.listId + "/items", {
        method: "POST",
        headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" },
        body: JSON.stringify({ fields })
      });
    }

    if (!res.ok){ console.error(await res.text()); showMsg("Couldn't save (" + res.status + "). Please try again or contact admin.", "error"); return; }

    showMsg(isEdit ? "Entry updated for " + fmtDate(dateStr) + "." : "Saved — thanks! Entry logged for " + fmtDate(dateStr) + ".", "ok");
    resetForm();
  } catch(e){ console.error(e); showMsg("Something went wrong. Please try again.", "error"); }
  finally { els.submitBtn.disabled = false; if (!editingId) els.submitBtn.textContent = "Submit entry"; }
}

els.submitBtn.onclick = submit;
els.tabLog.onclick = () => switchTab("log");
els.tabEntries.onclick = () => switchTab("entries");

init();
</script>
