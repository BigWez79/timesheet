<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#507DE5" />
<title>Power Analytix — Expenses</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Albert+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3/lib/msal-browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<style>
  :root{
    --ink:#10183a;--bg:#eef2fb;--card:#ffffff;--brand:#507DE5;--brand-dk:#2f55b8;--brand-deep:#1b3a8c;
    --line:#dde4f3;--muted:#69718c;--err:#b3261e;--warn:#8a6d1f;--ok:#1f7a4d;--radius:16px;
  }
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;font-family:'Albert Sans',system-ui,sans-serif;color:var(--ink);
    background:radial-gradient(130% 90% at 0% 0%,#dce7fb 0%,transparent 55%),radial-gradient(130% 90% at 100% 100%,#e3e9fa 0%,transparent 55%),var(--bg);
    display:flex;justify-content:center;align-items:flex-start;padding:28px 18px 60px;}
  .wrap{width:100%;max-width:480px;animation:rise .5s cubic-bezier(.2,.7,.3,1) both;}
  @keyframes rise{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
  header{display:flex;align-items:center;gap:13px;margin-bottom:20px;}
  .logo{width:54px;height:54px;border-radius:13px;flex:0 0 auto;background:#fff;border:1px solid var(--line);
    box-shadow:0 6px 16px -10px rgba(27,58,140,.5);object-fit:contain;padding:5px;}
  .brand-text .kicker{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--brand);font-weight:600;}
  h1{font-family:'Sora',sans-serif;font-weight:700;font-size:25px;line-height:1.05;margin:3px 0 0;letter-spacing:-.01em;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px;
    box-shadow:0 1px 0 rgba(0,0,0,.02),0 20px 44px -30px rgba(16,24,58,.4);}
  label{display:block;font-size:13px;font-weight:600;margin:0 0 6px;}
  .field{margin-bottom:16px;}
  input,select,textarea{width:100%;font-family:inherit;font-size:16px;color:var(--ink);background:#fff;
    border:1px solid var(--line);border-radius:10px;padding:11px 12px;transition:border-color .15s,box-shadow .15s;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(80,125,229,.18);}
  textarea{min-height:72px;resize:vertical;}
  .hint{font-size:12px;color:var(--muted);margin-top:5px;}
  .calc{background:#eef4ff;border:1px solid #cfddf7;border-radius:10px;padding:10px 12px;font-size:14px;color:var(--brand-dk);margin-bottom:16px;}
  .calc b{font-size:16px;}
  button{font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;border:none;border-radius:10px;padding:13px;transition:filter .15s,transform .05s;}
  .btn-primary{width:100%;background:linear-gradient(135deg,var(--brand) 0%,var(--brand-deep) 100%);color:#fff;}
  .btn-primary:hover{filter:brightness(1.06);}
  .btn-primary:active{transform:translateY(1px);}
  .btn-primary:disabled{opacity:.55;cursor:default;}
  .btn-ghost{width:100%;background:transparent;color:var(--muted);font-weight:500;font-size:13px;padding:8px;margin-top:10px;}
  .greeting{font-size:14px;color:var(--muted);margin-bottom:16px;}
  .greeting b{color:var(--ink);}
  .tabs{display:flex;gap:6px;background:#eef2fb;border:1px solid var(--line);border-radius:11px;padding:4px;margin-bottom:18px;}
  .tab{flex:1;background:transparent;color:var(--muted);font-size:13.5px;font-weight:600;padding:9px 4px;border-radius:8px;}
  .tab.active{background:#fff;color:var(--brand-dk);box-shadow:0 1px 4px -1px rgba(16,24,58,.2);}
  .msg{border-radius:10px;padding:11px 12px;font-size:14px;margin-bottom:16px;display:none;}
  .msg.show{display:block;}
  .msg.error{background:#fbeae9;color:var(--err);border:1px solid #f3c9c6;}
  .msg.warn{background:#fbf3dc;color:var(--warn);border:1px solid #f0e0b0;}
  .msg.ok{background:#e6f4ec;color:var(--ok);border:1px solid #c2e2cf;}
  .total{font-size:13px;color:var(--muted);margin-bottom:14px;}
  .total b{color:var(--ink);font-size:15px;}
  .entry{border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:10px;}
  .entry-top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px;}
  .entry-date{font-weight:600;font-size:15px;}
  .entry-amt{font-weight:600;color:var(--brand-dk);font-size:14px;white-space:nowrap;}
  .pill{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;background:#eef2fb;color:var(--brand-dk);}
  .entry-desc{font-size:13px;color:#3a4360;margin:6px 0 10px;line-height:1.45;}
  .entry-actions{display:flex;gap:8px;}
  .entry-actions button{flex:1;font-size:13px;font-weight:600;padding:8px;border-radius:8px;border:1px solid var(--line);background:#fff;}
  .btn-edit{color:var(--brand-dk);}.btn-edit:hover{background:#f3f7ff;}
  .btn-del{color:var(--err);}.btn-del:hover{background:#fdf2f1;}
  .empty,.loading{text-align:center;color:var(--muted);font-size:14px;padding:22px 0;}
  .rate-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
  .rate-grid label{font-size:11px;}
  .locked-note{font-size:12px;color:var(--warn);margin-top:4px;}
  #loginView{text-align:center;padding:8px 0 4px;}
  #loginView p{color:var(--muted);font-size:14px;margin:0 0 18px;}
  .hidden{display:none !important;}
  footer{text-align:center;font-size:11px;color:var(--muted);margin-top:18px;letter-spacing:.04em;}
  .section-h{font-family:'Sora',sans-serif;font-size:15px;font-weight:600;margin:4px 0 10px;}
</style>
</head>

    <div class="brand-text"><div class="kicker">Expenses</div><h1>Power Analytix</h1></div>
  </header>

  <div class="card">
    <div id="loginView">
      <p>Sign in to log and claim your expenses.</p>
      <button class="btn-primary" id="loginBtn">Sign in</button>
    </div>

    <div id="appView" class="hidden">
      <div class="greeting">Signed in as <b id="userName">…</b></div>

      <div class="tabs">
        <button class="tab active" id="tabLog">Log expense</button>
        <button class="tab" id="tabEntries">My entries</button>
        <button class="tab" id="tabClaim">Monthly claim</button>
        <button class="tab hidden" id="tabAdmin">Admin</button>
      </div>

      <div class="msg" id="message"></div>

      <!-- LOG -->
      <div id="logView">
        <div class="field"><label for="expDate">Date</label><input type="date" id="expDate" /></div>
        <div class="field"><label for="expType">Type</label>
          <select id="expType">
            <option value="Mileage">Mileage (own car)</option>
            <option value="Train/Bus">Train/Bus</option>
            <option value="Taxi">Taxi</option>
            <option value="Parking">Parking</option>
            <option value="Tolls">Tolls</option>
            <option value="Hotel">Hotel</option>
            <option value="Sundry">Sundry</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <!-- mileage fields -->
        <div id="mileageFields">
          <div class="field"><label for="miles">Miles</label><input type="number" id="miles" min="0" step="0.1" placeholder="e.g. 24.5" /></div>
          <div class="field"><label for="fromLoc">From</label><input type="text" id="fromLoc" placeholder="Start location" /></div>
          <div class="field"><label for="toLoc">To</label><input type="text" id="toLoc" placeholder="Destination" /></div>
          <div class="calc" id="calcLine">Mileage amount: <b>£0.00</b></div>
        </div>

        <!-- amount fields (non-mileage) -->
        <div id="amountFields" class="hidden">
          <div class="field"><label for="amount">Amount (£)</label><input type="number" id="amount" min="0" step="0.01" placeholder="e.g. 12.50" /></div>
          <div class="field"><label for="receipt">Receipt held?</label>
            <select id="receipt"><option value="No">No</option><option value="Yes">Yes</option></select>
          </div>
        </div>

        <div class="field"><label for="reason">Reason / purpose</label><input type="text" id="reason" placeholder="Business reason" /></div>
        <div class="field"><label for="notes">Notes (optional)</label><textarea id="notes" placeholder="Anything else…"></textarea></div>

        <button class="btn-primary" id="submitBtn">Add expense</button>
        <button class="btn-ghost hidden" id="cancelEditBtn">Cancel edit</button>
      </div>

      <!-- MY ENTRIES -->
      <div id="entriesView" class="hidden">
        <div class="total" id="totalLine"></div>
        <div id="entriesList"><div class="loading">Loading…</div></div>
      </div>

      <!-- MONTHLY CLAIM -->
      <div id="claimView" class="hidden">
        <div class="field"><label for="claimMonth">Claim month (completed months only)</label>
          <select id="claimMonth"></select>
        </div>
        <button class="btn-primary" id="downloadBtn">Download claim (PDF)</button>
        <div class="locked-note hidden" id="lockedNote">This month has already been claimed and is locked.</div>
        <div id="claimPreview" style="margin-top:16px;"></div>
      </div>

      <!-- ADMIN -->
      <div id="adminView" class="hidden">
        <div class="section-h">HMRC mileage rates</div>
        <div class="rate-grid">
          <div><label for="rate1">First-10k £/mile</label><input type="number" id="rate1" step="0.01" /></div>
          <div><label for="threshold">Threshold (mi)</label><input type="number" id="threshold" step="1" /></div>
          <div><label for="rate2">Over £/mile</label><input type="number" id="rate2" step="0.01" /></div>
        </div>
        <button class="btn-primary" id="saveRatesBtn">Save rates</button>

        <div class="section-h" style="margin-top:22px;">Download anyone's claim</div>
        <div class="field"><label for="adminUser">Person</label><select id="adminUser"></select></div>
        <div class="field"><label for="adminMonth">Month</label><select id="adminMonth"></select></div>
        <button class="btn-primary" id="adminDownloadBtn">Download their claim (PDF)</button>
      </div>

      <button class="btn-ghost" id="logoutBtn">Sign out</button>
    </div>
  </div>

  <footer>Power Analytix · expenses are logged to your company records.</footer>
</div>

<script>
/* ---------------- CONFIG ---------------- */
const CONFIG = {
  clientId: "f76b090f-7d46-447b-8545-954d22814232",
  tenantId: "be344548-8db6-49d6-8155-1f85b6ae1dad",
  redirectUri: "https://expenses.poweranalytix.co.uk/",
  siteId: "netorgft7286889.sharepoint.com,7ea87cd4-0fea-4a09-9591-d64b03c67873,74b8ba2d-7746-467d-a85a-e6882f9a11bd",
  expensesListId: "E146D21D-8FE4-410A-B1CB-BF717E6758D4",
  settingsListId: "8e4007ee-4f3e-48d4-9997-efe79c769939",
  staffListId: "cabf2431-0a5e-49d2-8682-ebf5537f134c",
  admins: ["wesley.hughes@utilitiesms.co.uk"]   // emails that see the Admin tab
};
const GRAPH = "https://graph.microsoft.com/v1.0";
const SCOPES = ["User.Read", "Sites.ReadWrite.All"];
const TAX_YEAR_START_MONTH = 4, TAX_YEAR_START_DAY = 6; // 6 April

const msalConfig = {
  auth:{ clientId:CONFIG.clientId, authority:"https://login.microsoftonline.com/"+CONFIG.tenantId, redirectUri:CONFIG.redirectUri },
  cache:{ cacheLocation:"sessionStorage", storeAuthStateInCookie:false }
};

let msalInstance, account=null, editingId=null, isAdmin=false;
let rates={ rate1:0.55, threshold:10000, rate2:0.25 };
let officialName=null;   // resolved from the Staff list; falls back to account name

const $ = id => document.getElementById(id);
const E = {};
["loginView","appView","loginBtn","logoutBtn","tabLog","tabEntries","tabClaim","tabAdmin",
 "logView","entriesView","claimView","adminView","submitBtn","cancelEditBtn","userName","message",
 "expDate","expType","mileageFields","amountFields","miles","fromLoc","toLoc","calcLine","amount","receipt","reason","notes",
 "totalLine","entriesList","claimMonth","downloadBtn","lockedNote","claimPreview",
 "rate1","threshold","rate2","saveRatesBtn","adminUser","adminMonth","adminDownloadBtn"].forEach(id=>E[id]=$(id));

function showMsg(t,c){E.message.textContent=t;E.message.className="msg show "+c;}
function clearMsg(){E.message.className="msg";}
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function gbp(n){return "£"+(Number(n)||0).toFixed(2);}
function todayISO(){const d=new Date();return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10);}
function fmtDate(iso){const d=new Date(iso);return isNaN(d)?iso:d.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});}
function fmtMonth(ym){const [y,m]=ym.split("-");return new Date(y,m-1,1).toLocaleDateString("en-GB",{month:"long",year:"numeric"});}

/* tax-year start for a given date */
function taxYearStart(d){
  const y=d.getFullYear();
  const start=new Date(y,TAX_YEAR_START_MONTH-1,TAX_YEAR_START_DAY);
  return (d>=start)?start:new Date(y-1,TAX_YEAR_START_MONTH-1,TAX_YEAR_START_DAY);
}

/* ---------------- MSAL ---------------- */
async function init(){
  msalInstance=new msal.PublicClientApplication(msalConfig);
  await msalInstance.initialize();
  try{const r=await msalInstance.handleRedirectPromise();if(r&&r.account)account=r.account;}catch(e){console.error(e);}
  if(!account){const a=msalInstance.getAllAccounts();if(a.length)account=a[0];}
  if(account) await afterLogin(); else E.loginView.classList.remove("hidden");
}
E.loginBtn.onclick=()=>msalInstance.loginRedirect({scopes:SCOPES});
E.logoutBtn.onclick=()=>msalInstance.logoutRedirect({account});
async function getToken(){try{const r=await msalInstance.acquireTokenSilent({scopes:SCOPES,account});return r.accessToken;}catch(e){await msalInstance.acquireTokenRedirect({scopes:SCOPES});throw e;}}

async function resolveOfficialName(){
  try{
    const token=await getToken();
    const res=await fetch(GRAPH+"/sites/"+CONFIG.siteId+"/lists/"+CONFIG.staffListId+"/items?$expand=fields&$top=500",{headers:{Authorization:"Bearer "+token}});
    if(res.ok){
      const d=await res.json();const me=(account.username||"").toLowerCase();
      const row=(d.value||[]).find(i=>((i.fields?.Title)||"").toLowerCase()===me);
      if(row&&row.fields&&row.fields.OfficialName) officialName=row.fields.OfficialName;
    }
  }catch(e){console.warn("Staff lookup failed",e);}
  if(!officialName) officialName=account.name||account.username;  // fallback
}
function displayName(){ return officialName||account.name||account.username; }

async function afterLogin(){
  E.loginView.classList.add("hidden");E.appView.classList.remove("hidden");
  await resolveOfficialName();
  E.userName.textContent=displayName();
  isAdmin=CONFIG.admins.map(s=>s.toLowerCase()).includes((account.username||"").toLowerCase());
  if(isAdmin)E.tabAdmin.classList.remove("hidden");
  await loadRates();
  E.expDate.value=todayISO();
  switchTab("log");
}

/* ---------------- rates ---------------- */
async function loadRates(){
  try{
    const token=await getToken();
    const res=await fetch(GRAPH+"/sites/"+CONFIG.siteId+"/lists/"+CONFIG.settingsListId+"/items?$expand=fields&$top=5",{headers:{Authorization:"Bearer "+token}});
    if(res.ok){const d=await res.json();const row=(d.value||[]).find(i=>(i.fields?.Title||"")==="MileageRates")||d.value?.[0];
      if(row&&row.fields){rates={rate1:Number(row.fields.Rate1)||0.55,threshold:Number(row.fields.Threshold)||10000,rate2:Number(row.fields.Rate2)||0.25};rates._id=row.id;}}
  }catch(e){console.warn("rates load failed, using defaults",e);}
  E.rate1.value=rates.rate1;E.threshold.value=rates.threshold;E.rate2.value=rates.rate2;
}
E.saveRatesBtn.onclick=async()=>{
  try{
    const token=await getToken();
    const body={fields:{Rate1:Number(E.rate1.value),Threshold:Number(E.threshold.value),Rate2:Number(E.rate2.value)}};
    if(!rates._id){showMsg("Couldn't find the rates row to update.","error");return;}
    const res=await fetch(GRAPH+"/sites/"+CONFIG.siteId+"/lists/"+CONFIG.settingsListId+"/items/"+rates._id+"/fields",{method:"PATCH",headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},body:JSON.stringify(body.fields)});
    if(!res.ok){console.error(await res.text());showMsg("Couldn't save rates ("+res.status+").","error");return;}
    rates.rate1=Number(E.rate1.value);rates.threshold=Number(E.threshold.value);rates.rate2=Number(E.rate2.value);
    showMsg("Rates saved.","ok");
  }catch(e){console.error(e);showMsg("Error saving rates.","error");}
};

/* mileage £ for a single trip given prior tax-year miles */
function mileageAmount(miles, priorMiles){
  miles=Number(miles)||0; let remaining=Math.max(0,rates.threshold-priorMiles);
  const at1=Math.min(miles,remaining), at2=miles-at1;
  return at1*rates.rate1 + at2*rates.rate2;
}

/* ---------------- tabs / form ---------------- */
function switchTab(tab){
  clearMsg();
  [["log",E.tabLog,E.logView],["entries",E.tabEntries,E.entriesView],["claim",E.tabClaim,E.claimView],["admin",E.tabAdmin,E.adminView]]
    .forEach(([k,btn,view])=>{const on=k===tab;btn.classList.toggle("active",on);view.classList.toggle("hidden",!on);});
  if(tab==="log"){ if(!editingId) resetForm(); toggleTypeFields(); }
  if(tab==="entries") loadEntries();
  if(tab==="claim") buildMonthDropdown(E.claimMonth);
  if(tab==="admin"){ buildAdminUsers(); }
}
function toggleTypeFields(){
  const m=E.expType.value==="Mileage";
  E.mileageFields.classList.toggle("hidden",!m);
  E.amountFields.classList.toggle("hidden",m);
  if(m) updateCalc();
}
E.expType.onchange=toggleTypeFields;
E.miles.oninput=updateCalc;

let myItemsCache=[];
async function updateCalc(){
  // prior tax-year miles for live calc
  const d=new Date(E.expDate.value||todayISO());const tys=taxYearStart(d);
  let prior=0;
  myItemsCache.forEach(it=>{const f=it.fields||{};if(f.ExpenseType==="Mileage"){const ed=new Date(f.ExpenseDate);if(ed>=tys&&ed<d&&it.id!==editingId)prior+=Number(f.Miles)||0;}});
  const amt=mileageAmount(E.miles.value,prior);
  E.calcLine.innerHTML="Mileage amount: <b>"+gbp(amt)+"</b> <span style='color:var(--muted)'>("+(prior>=rates.threshold?"over":"")+(prior+ (Number(E.miles.value)||0)>rates.threshold && prior<rates.threshold?"split across "+rates.threshold+"mi":"")+")</span>";
}
function resetForm(){
  editingId=null;E.expDate.value=todayISO();E.expType.value="Mileage";
  E.miles.value="";E.fromLoc.value="";E.toLoc.value="";E.amount.value="";E.receipt.value="No";E.reason.value="";E.notes.value="";
  E.submitBtn.textContent="Add expense";E.cancelEditBtn.classList.add("hidden");toggleTypeFields();
}
E.cancelEditBtn.onclick=resetForm;

/* ---------------- data ---------------- */
async function fetchItems(token, email){
  const url=GRAPH+"/sites/"+CONFIG.siteId+"/lists/"+CONFIG.expensesListId+"/items?$expand=fields&$top=500"+
    (email?("&$filter=fields/StaffEmail eq '"+email.replace(/'/g,"''")+"'"):"");
  const res=await fetch(url,{headers:{Authorization:"Bearer "+token,Prefer:"HonorNonIndexedQueriesWarningMayFailRandomly"}});
  if(!res.ok)throw new Error("list "+res.status);
  const d=await res.json();
  return (d.value||[]).sort((a,b)=>(b.fields?.ExpenseDate||"").localeCompare(a.fields?.ExpenseDate||""));
}

async function loadEntries(){
  E.entriesList.innerHTML='<div class="loading">Loading…</div>';E.totalLine.textContent="";
  try{
    const token=await getToken();
    const items=await fetchItems(token,account.username);
    myItemsCache=items;
    renderEntries(items);
  }catch(e){console.error(e);E.entriesList.innerHTML='<div class="empty">Couldn\'t load your entries.</div>';}
}
function renderEntries(items){
  if(!items.length){E.entriesList.innerHTML='<div class="empty">No expenses yet. Add one in the “Log expense” tab.</div>';return;}
  const now=new Date();const ym=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
  let monthTotal=0;items.forEach(it=>{if(((it.fields?.ClaimMonth)||((it.fields?.ExpenseDate||"").slice(0,7)))===ym)monthTotal+=Number(it.fields?.Amount)||0;});
  E.totalLine.innerHTML="This month: <b>"+gbp(monthTotal)+"</b>";
  E.entriesList.innerHTML=items.map(it=>{const f=it.fields||{};const locked=f.MonthLocked===true||f.MonthLocked==="true";
    const sub=f.ExpenseType==="Mileage"?((f.Miles||0)+" mi · "+esc(f.FromLocation||"")+" → "+esc(f.ToLocation||"")):esc(f.Reason||f.ExpenseType||"");
    return '<div class="entry"><div class="entry-top"><span class="entry-date">'+fmtDate(f.ExpenseDate)+'</span><span class="entry-amt">'+gbp(f.Amount)+'</span></div>'+
      '<span class="pill">'+esc(f.ExpenseType||"")+'</span>'+
      '<div class="entry-desc">'+sub+(f.Notes?(' — '+esc(f.Notes)):'')+'</div>'+
      (locked?'<div class="locked-note">Claimed — locked.</div>':
       '<div class="entry-actions"><button class="btn-edit" data-edit="'+it.id+'">Edit</button><button class="btn-del" data-del="'+it.id+'" data-date="'+esc((f.ExpenseDate||"").slice(0,10))+'">Delete</button></div>')+
      '</div>';
  }).join("");
  E.entriesList.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>{const it=items.find(x=>x.id===b.getAttribute("data-edit"));if(it)beginEdit(it);});
  E.entriesList.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>deleteEntry(b.getAttribute("data-del"),b.getAttribute("data-date")));
}
function beginEdit(it){
  const f=it.fields||{};editingId=it.id;
  E.expDate.value=(f.ExpenseDate||"").slice(0,10)||todayISO();E.expType.value=f.ExpenseType||"Mileage";
  E.miles.value=f.Miles??"";E.fromLoc.value=f.FromLocation||"";E.toLoc.value=f.ToLocation||"";
  E.amount.value=f.Amount??"";E.receipt.value=f.ReceiptHeld||"No";E.reason.value=f.Reason||"";E.notes.value=f.Notes||"";
  E.submitBtn.textContent="Update expense";E.cancelEditBtn.classList.remove("hidden");
  switchTab("log");toggleTypeFields();
}
async function deleteEntry(id,dateStr){
  if(!confirm("Delete your expense for "+fmtDate(dateStr)+"?"))return;
  try{const token=await getToken();
    const res=await fetch(GRAPH+"/sites/"+CONFIG.siteId+"/lists/"+CONFIG.expensesListId+"/items/"+id,{method:"DELETE",headers:{Authorization:"Bearer "+token}});
    if(!res.ok&&res.status!==204){showMsg("Couldn't delete ("+res.status+").","error");return;}
    showMsg("Deleted.","ok");loadEntries();
  }catch(e){console.error(e);showMsg("Error deleting.","error");}
}

/* ---------------- submit ---------------- */
E.submitBtn.onclick=async()=>{
  clearMsg();
  const date=E.expDate.value,type=E.expType.value;
  if(!date){showMsg("Please choose a date.","error");return;}
  let amount,miles=null,from="",to="",receipt="No";
  if(type==="Mileage"){
    miles=parseFloat(E.miles.value);
    if(isNaN(miles)||miles<=0){showMsg("Enter the miles driven.","error");return;}
    from=E.fromLoc.value.trim();to=E.toLoc.value.trim();
    const d=new Date(date);const tys=taxYearStart(d);let prior=0;
    myItemsCache.forEach(it=>{const f=it.fields||{};if(f.ExpenseType==="Mileage"){const ed=new Date(f.ExpenseDate);if(ed>=tys&&ed<d&&it.id!==editingId)prior+=Number(f.Miles)||0;}});
    amount=mileageAmount(miles,prior);
  } else {
    amount=parseFloat(E.amount.value);
    if(isNaN(amount)||amount<0){showMsg("Enter the amount.","error");return;}
    receipt=E.receipt.value;
  }
  E.submitBtn.disabled=true;E.submitBtn.textContent=editingId?"Updating…":"Saving…";
  try{
    const token=await getToken();const email=account.username;
    const fields={Title:email+" - "+date,ExpenseDate:date,ExpenseType:type,Miles:miles,FromLocation:from,ToLocation:to,
      Amount:Number(amount.toFixed(2)),Reason:E.reason.value.trim(),ReceiptHeld:receipt,Notes:E.notes.value.trim(),
      StaffName:displayName(),StaffEmail:email,SubmittedOn:new Date().toISOString(),ClaimMonth:date.slice(0,7)};
    let res;
    if(editingId){res=await fetch(GRAPH+"/sites/"+CONFIG.siteId+"/lists/"+CONFIG.expensesListId+"/items/"+editingId+"/fields",{method:"PATCH",headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},body:JSON.stringify(fields)});}
    else {res=await fetch(GRAPH+"/sites/"+CONFIG.siteId+"/lists/"+CONFIG.expensesListId+"/items",{method:"POST",headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},body:JSON.stringify({fields})});}
    if(!res.ok){console.error(await res.text());showMsg("Couldn't save ("+res.status+").","error");return;}
    showMsg(editingId?"Expense updated.":"Expense added"+(type==="Mileage"?(" — "+gbp(amount)):"")+".","ok");
    resetForm();
  }catch(e){console.error(e);showMsg("Something went wrong.","error");}
  finally{E.submitBtn.disabled=false;if(!editingId)E.submitBtn.textContent="Add expense";}
};

/* ---------------- month dropdowns ---------------- */
function completedMonths(n){
  const out=[];const d=new Date();d.setDate(1);
  for(let i=1;i<=n;i++){d.setMonth(d.getMonth()-1);out.push(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"));}
  return out; // most recent completed first
}
function buildMonthDropdown(sel){
  sel.innerHTML=completedMonths(12).map(m=>'<option value="'+m+'">'+fmtMonth(m)+'</option>').join("");
}

/* ---------------- claim PDF ---------------- */
function buildClaim(items, ym, person){
  const monthItems=items.filter(it=>((it.fields?.ClaimMonth)||((it.fields?.ExpenseDate||"").slice(0,7)))===ym);
  const mileage=monthItems.filter(it=>it.fields?.ExpenseType==="Mileage");
  const other=monthItems.filter(it=>it.fields?.ExpenseType!=="Mileage");
  const mileTotal=mileage.reduce((s,it)=>s+(Number(it.fields?.Amount)||0),0);
  const otherTotal=other.reduce((s,it)=>s+(Number(it.fields?.Amount)||0),0);
  return {monthItems,mileage,other,mileTotal,otherTotal,grand:mileTotal+otherTotal,person,ym};
}
function renderClaimPDF(c){
  const { jsPDF }=window.jspdf;const doc=new jsPDF({unit:"pt",format:"a4"});
  const M=40;let y=54;
  doc.setFont("helvetica","bold");doc.setFontSize(18);doc.setTextColor(27,58,140);
  doc.text("Power Analytix",M,y);
  doc.setFont("helvetica","normal");doc.setFontSize(11);doc.setTextColor(60,67,96);
  doc.text("Expenses claim",M,y+18);
  doc.setFontSize(10);doc.setTextColor(80,90,110);
  doc.text("Name: "+(c.person.name||c.person.email),M,y+40);
  doc.text("Email: "+c.person.email,M,y+54);
  doc.text("Month: "+fmtMonth(c.ym),M,y+68);
  y+=96;

  function table(title,rows){
    doc.setFont("helvetica","bold");doc.setFontSize(12);doc.setTextColor(27,58,140);doc.text(title,M,y);y+=16;
    doc.setFont("helvetica","normal");doc.setFontSize(9);doc.setTextColor(40,48,72);
    rows.forEach(r=>{ if(y>770){doc.addPage();y=54;} doc.text(r[0],M,y);doc.text(r[1],M+330,y);doc.text(r[2],M+460,y,{align:"left"});y+=14; });
    y+=8;
  }
  if(c.mileage.length){
    table("Mileage",c.mileage.map(it=>{const f=it.fields;const route=(f.FromLocation||f.ToLocation)?((f.FromLocation||"?")+" to "+(f.ToLocation||"?")):"";return [fmtDate(f.ExpenseDate)+(route?("  "+route):""),(f.Miles||0)+" mi",gbp(f.Amount)];}));
    doc.setFont("helvetica","bold");doc.setFontSize(9);doc.text("Mileage subtotal",M+330,y-2);doc.text(gbp(c.mileTotal),M+460,y-2);y+=18;
  }
  if(c.other.length){
    table("Other expenses",c.other.map(it=>{const f=it.fields;return [fmtDate(f.ExpenseDate)+"  "+f.ExpenseType+(f.Reason?(" — "+f.Reason):"")+(f.ReceiptHeld==="Yes"?"  [receipt]":""),"",gbp(f.Amount)];}));
    doc.setFont("helvetica","bold");doc.setFontSize(9);doc.text("Other subtotal",M+330,y-2);doc.text(gbp(c.otherTotal),M+460,y-2);y+=18;
  }
  doc.setDrawColor(200);doc.line(M,y,555,y);y+=18;
  doc.setFont("helvetica","bold");doc.setFontSize(13);doc.setTextColor(27,58,140);
  doc.text("Total to claim",M,y);doc.text(gbp(c.grand),M+460,y);y+=34;
  doc.setFont("helvetica","italic");doc.setFontSize(8);doc.setTextColor(110,113,140);
  doc.text("I confirm these expenses were incurred wholly and necessarily for business.",M,y);
  doc.text("Generated "+new Date().toLocaleString("en-GB"),M,y+12);
  doc.save("PowerAnalytix-expenses-"+c.ym+"-"+(c.person.name||c.person.email).replace(/[^a-z0-9]/gi,"_")+".pdf");
}

async function lockMonth(token, items, ym){
  const ids=items.filter(it=>((it.fields?.ClaimMonth)||((it.fields?.ExpenseDate||"").slice(0,7)))===ym).map(it=>it.id);
  for(const id of ids){
    try{ await fetch(GRAPH+"/sites/"+CONFIG.siteId+"/lists/"+CONFIG.expensesListId+"/items/"+id+"/fields",
      {method:"PATCH",headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},body:JSON.stringify({MonthLocked:true})}); }catch(e){console.warn(e);}
  }
}

E.downloadBtn.onclick=async()=>{
  clearMsg();const ym=E.claimMonth.value;if(!ym)return;
  E.downloadBtn.disabled=true;E.downloadBtn.textContent="Building…";
  try{
    const token=await getToken();const items=await fetchItems(token,account.username);
    const c=buildClaim(items,ym,{name:displayName(),email:account.username});
    if(!c.monthItems.length){showMsg("No expenses logged for "+fmtMonth(ym)+".","warn");return;}
    renderClaimPDF(c);
    await lockMonth(token,items,ym);
    showMsg("Claim downloaded for "+fmtMonth(ym)+". That month is now locked.","ok");
  }catch(e){console.error(e);showMsg("Couldn't build the claim.","error");}
  finally{E.downloadBtn.disabled=false;E.downloadBtn.textContent="Download claim (PDF)";}
};

/* ---------------- admin ---------------- */
let allItemsCache=[];
async function buildAdminUsers(){
  E.adminUser.innerHTML='<option>Loading…</option>';
  try{
    const token=await getToken();const items=await fetchItems(token,null); // all rows (admin sees all)
    allItemsCache=items;
    const map={};items.forEach(it=>{const f=it.fields||{};if(f.StaffEmail)map[f.StaffEmail]=f.StaffName||f.StaffEmail;});
    const opts=Object.entries(map).map(([em,nm])=>'<option value="'+em+'">'+esc(nm)+' ('+esc(em)+')</option>').join("");
    E.adminUser.innerHTML=opts||'<option value="">No data yet</option>';
    buildMonthDropdown(E.adminMonth);
  }catch(e){console.error(e);E.adminUser.innerHTML='<option value="">Couldn\'t load</option>';}
}
E.adminDownloadBtn.onclick=async()=>{
  clearMsg();const email=E.adminUser.value,ym=E.adminMonth.value;if(!email||!ym)return;
  E.adminDownloadBtn.disabled=true;E.adminDownloadBtn.textContent="Building…";
  try{
    const token=await getToken();
    // IMPORTANT: fetch ALL rows unfiltered (admin/Full-Control sees everything in an unfiltered
    // enumeration). A server-side $filter on another user's StaffEmail can be trimmed to empty by
    // item-level permissions, so we filter to the chosen person CLIENT-SIDE instead.
    const all=await fetchItems(token,null);
    const wanted=email.toLowerCase();
    const items=all.filter(it=>((it.fields&&it.fields.StaffEmail)||"").toLowerCase()===wanted);
    console.log("[admin] read",all.length,"total rows; matched",items.length,"for",email,
      "— their ClaimMonths:",items.map(it=>it.fields&&it.fields.ClaimMonth),
      "— all StaffEmails seen:",[...new Set(all.map(it=>it.fields&&it.fields.StaffEmail))]);
    const name=(typeof adminNameMap!=="undefined" && adminNameMap[email.toLowerCase()]) || (items[0]&&items[0].fields&&items[0].fields.StaffName) || email;
    const c=buildClaim(items,ym,{name,email});
    console.log("[admin] target month",ym,"— matched",c.monthItems.length,"item(s)");
    if(!c.monthItems.length){
      showMsg("No expenses found for "+name+" in "+fmtMonth(ym)+". (Read "+items.length+" total row(s) for them — check the console.)","warn");
      return;
    }
    renderClaimPDF(c);
    showMsg("Downloaded "+name+"'s claim for "+fmtMonth(ym)+".","ok");
  }catch(e){console.error("[admin] download error",e);showMsg("Couldn't build that claim — see console.","error");}
  finally{E.adminDownloadBtn.disabled=false;E.adminDownloadBtn.textContent="Download their claim (PDF)";}
};

E.tabLog.onclick=()=>switchTab("log");
E.tabEntries.onclick=()=>switchTab("entries");
E.tabClaim.onclick=()=>switchTab("claim");
E.tabAdmin.onclick=()=>switchTab("admin");

init();
</script>
